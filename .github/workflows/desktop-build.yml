name: Build StockSense Desktop

# Internal distribution only: this workflow is deliberately manual and uploads
# installers as Actions artifacts. It never creates or changes a GitHub Release.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target platform"
        required: true
        default: all
        type: choice
        options:
          - all
          - windows-x64
          - macos-arm64
      flavor:
        description: "Installer flavor (offline bundles the runtime; network downloads it on first launch)"
        required: true
        default: offline
        type: choice
        options:
          - offline
          - network

# The workflow only reads the selected ref and uploads private workflow
# artifacts, so it never needs a write-capable GitHub token.
permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}-${{ inputs.target }}-${{ inputs.flavor }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows x64 (${{ inputs.flavor }})
    if: inputs.target == 'all' || inputs.target == 'windows-x64'
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # prepare-offline-runtime keeps its own platform-specific Python and wheel
      # cache, separate from uv's normal cache. Keep it OS/arch/lockfile scoped.
      - name: Restore offline runtime cache
        if: inputs.flavor == 'offline'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: apps/desktop/build/offline-runtime-prep
          key: stocksense-offline-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'apps/desktop/scripts/prepare-offline-runtime.cjs') }}
          restore-keys: |
            stocksense-offline-runtime-${{ runner.os }}-${{ runner.arch }}-

      - name: Verify native build host
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -ne 'Windows' -or [Environment]::Is64BitOperatingSystem -ne $true) {
            throw 'Windows x64 installer must be built on a native Windows x64 runner.'
          }

      - name: Install workspace dependencies
        uses: ./.github/actions/retry
        with:
          command: npm ci

      - name: Build installer
        working-directory: apps/desktop
        run: npm run dist:win${{ inputs.flavor == 'network' && ':thin' || '' }}

      - name: Write checksums
        shell: pwsh
        run: |
          Get-ChildItem 'apps/desktop/release' -Filter '*.exe' |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $($_.Name)" } |
            Set-Content 'apps/desktop/release/SHA256SUMS.txt'

      - name: Upload Windows installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: stocksense-windows-x64-${{ inputs.flavor }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  macos:
    name: macOS arm64 (${{ inputs.flavor }})
    if: inputs.target == 'all' || inputs.target == 'macos-arm64'
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # prepare-offline-runtime keeps its own platform-specific Python and wheel
      # cache, separate from uv's normal cache. Keep it OS/arch/lockfile scoped.
      - name: Restore offline runtime cache
        if: inputs.flavor == 'offline'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: apps/desktop/build/offline-runtime-prep
          key: stocksense-offline-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock', 'apps/desktop/scripts/prepare-offline-runtime.cjs') }}
          restore-keys: |
            stocksense-offline-runtime-${{ runner.os }}-${{ runner.arch }}-

      - name: Verify native build host
        run: |
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64

      - name: Install workspace dependencies
        uses: ./.github/actions/retry
        with:
          command: npm ci

      - name: Build installer
        working-directory: apps/desktop
        run: npm run dist:mac${{ inputs.flavor == 'network' && ':thin' || '' }}

      - name: Write checksums
        run: |
          cd apps/desktop/release
          shasum -a 256 *.dmg *.zip > SHA256SUMS.txt

      - name: Upload macOS installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: stocksense-macos-arm64-${{ inputs.flavor }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
